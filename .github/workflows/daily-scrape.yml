name: Daily SUUMO Scrape
on:
  schedule:
    - cron: '0 5 * * *'   # 2:00 PM Japan time (JST = UTC+9)
  workflow_dispatch:       # Allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt into Node.js 24 now (mandatory Sep 2026)

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to push the updated HTML

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Inject listings into HTML
        run: python inject.py

      - name: Sync index.html
        run: cp suumo-compare.html index.html

      - name: Notify Telegram & update known listings
        if: always()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS:       ${{ job.status }}
        run: python notify.py

      - name: Commit updated site & known listings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add suumo-compare.html index.html known_nc_ids.json history.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: auto-update listings $(date -u +'%Y-%m-%d')"

      - name: Push
        run: git push
